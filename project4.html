<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f9fafb;--surface:#fff;--text:#111827;--muted:#6b7280;
      --border:#e5e7eb;--green:#16a34a;--red:#dc2626;--blue:#2563eb;
      --radius:14px;
    }
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem;max-width:900px;margin:0 auto}
    h1{font-size:1.6rem;font-weight:800;margin-bottom:.3rem}
    .subtitle{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}

    /* SUMMARY CARDS */
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
    .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem}
    .sum-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
    .sum-value{font-size:1.6rem;font-weight:800}
    .sum-value.green{color:var(--green)}
    .sum-value.red{color:var(--red)}
    .sum-value.blue{color:var(--blue)}

    /* MAIN LAYOUT */
    .main-layout{display:grid;grid-template-columns:1fr 1.4fr;gap:1.2rem;align-items:start}
    @media(max-width:640px){.main-layout{grid-template-columns:1fr}}

    /* ADD FORM */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem}
    .form-card h2{font-size:1rem;font-weight:700;margin-bottom:1rem}
    .form-group{margin-bottom:.8rem}
    label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
    input,select{width:100%;padding:.65rem .9rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.9rem;color:var(--text);outline:none;background:#fff;transition:border-color .2s}
    input:focus,select:focus{border-color:#7c3aed}

    .type-toggle{display:grid;grid-template-columns:1fr 1fr;border-radius:10px;overflow:hidden;border:1.5px solid var(--border)}
    .type-btn{padding:.6rem;font-family:inherit;font-weight:600;font-size:.85rem;border:none;cursor:pointer;transition:all .2s;background:#fff;color:var(--muted)}
    .type-btn.active-income{background:#dcfce7;color:var(--green)}
    .type-btn.active-expense{background:#fee2e2;color:var(--red)}

    .add-btn{width:100%;padding:.75rem;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .2s}
    .add-btn:hover{opacity:.9}

    /* TRANSACTIONS */
    .list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem}
    .list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .list-card h2{font-size:1rem;font-weight:700}
    .clear-btn{font-size:.75rem;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600}

    .filter-row{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
    .filter-btn{padding:.3rem .8rem;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s}
    .filter-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed}

    .tx-list{display:flex;flex-direction:column;gap:.5rem;max-height:420px;overflow-y:auto}
    .tx-list::-webkit-scrollbar{width:3px}
    .tx-list::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:4px}

    .tx-item{display:flex;align-items:center;gap:.8rem;padding:.75rem 1rem;border-radius:10px;background:var(--bg);border:1px solid var(--border);animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .tx-info{flex:1;min-width:0}
    .tx-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-meta{font-size:.72rem;color:var(--muted);margin-top:1px}
    .tx-amount{font-weight:700;font-size:.95rem;white-space:nowrap}
    .tx-amount.income{color:var(--green)}
    .tx-amount.expense{color:var(--red)}
    .tx-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 5px;opacity:.5;transition:opacity .2s}
    .tx-delete:hover{opacity:1;color:var(--red)}

    .empty-state{text-align:center;color:var(--muted);font-size:.9rem;padding:2rem}

    /* CHART */
    .chart-section{margin-top:1.2rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem}
    .chart-section h2{font-size:1rem;font-weight:700;margin-bottom:1rem}
    .cat-bars{display:flex;flex-direction:column;gap:.7rem}
    .cat-row{display:flex;align-items:center;gap:.8rem}
    .cat-label{font-size:.78rem;font-weight:600;width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cat-bar-wrap{flex:1;background:#f3f4f6;border-radius:20px;height:10px;overflow:hidden}
    .cat-bar{height:100%;border-radius:20px;transition:width .5s ease}
    .cat-amount{font-size:.75rem;font-weight:700;color:var(--muted);min-width:50px;text-align:right}
  </style>
</head>
<body>
  <h1>💰 Expense Tracker</h1>
  <p class="subtitle">Track income & expenses in real-time — data saved in browser</p>

  <!-- SUMMARY -->
  <div class="summary-grid">
    <div class="sum-card"><div class="sum-label">Total Balance</div><div class="sum-value blue" id="balance">₹0</div></div>
    <div class="sum-card"><div class="sum-label">Total Income</div><div class="sum-value green" id="total-income">₹0</div></div>
    <div class="sum-card"><div class="sum-label">Total Expenses</div><div class="sum-value red" id="total-expense">₹0</div></div>
    <div class="sum-card"><div class="sum-label">Transactions</div><div class="sum-value" id="tx-count">0</div></div>
  </div>

  <div class="main-layout">
    <!-- FORM -->
    <div class="form-card">
      <h2>Add Transaction</h2>
      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn active-income" id="btn-income" onclick="setType('income')">+ Income</button>
          <button class="type-btn" id="btn-expense" onclick="setType('expense')">− Expense</button>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc-inp" placeholder="e.g. Salary, Grocery..."/>
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount-inp" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="cat-inp">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="Bills">💡 Bills</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">🏥 Health</option>
          <option value="Salary">💼 Salary</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="date-inp"/>
      </div>
      <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- LIST -->
    <div>
      <div class="list-card">
        <div class="list-header">
          <h2>Transactions</h2>
          <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('income',this)">Income</button>
          <button class="filter-btn" onclick="setFilter('expense',this)">Expense</button>
        </div>
        <div class="tx-list" id="tx-list"></div>
      </div>

      <div class="chart-section">
        <h2>Spending by Category</h2>
        <div class="cat-bars" id="cat-bars"></div>
      </div>
    </div>
  </div>

  <script>
    const CATEGORY_ICONS = { Food:"🍔", Transport:"🚗", Shopping:"🛍", Bills:"💡", Entertainment:"🎬", Health:"🏥", Salary:"💼", Other:"📦" };
    const CATEGORY_COLORS = { Food:"#f97316", Transport:"#3b82f6", Shopping:"#ec4899", Bills:"#eab308", Entertainment:"#8b5cf6", Health:"#ef4444", Salary:"#22c55e", Other:"#94a3b8" };

    let transactions = JSON.parse(localStorage.getItem("expenses_v2") || "[]");
    let currentType = "income";
    let currentFilter = "all";

    // Set today's date
    document.getElementById("date-inp").value = new Date().toISOString().split("T")[0];

    function setType(type) {
      currentType = type;
      document.getElementById("btn-income").className = "type-btn" + (type==="income" ? " active-income" : "");
      document.getElementById("btn-expense").className = "type-btn" + (type==="expense" ? " active-expense" : "");
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      el.classList.add("active");
      renderList();
    }

    function addTransaction() {
      const desc = document.getElementById("desc-inp").value.trim();
      const amount = parseFloat(document.getElementById("amount-inp").value);
      const category = document.getElementById("cat-inp").value;
      const date = document.getElementById("date-inp").value;

      if (!desc || !amount || amount <= 0) {
        alert("Please fill in description and a valid amount!");
        return;
      }

      const tx = {
        id: Date.now(),
        type: currentType,
        desc, amount, category, date,
        createdAt: new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
      };

      transactions.unshift(tx);
      save();
      render();

      // Clear form
      document.getElementById("desc-inp").value = "";
      document.getElementById("amount-inp").value = "";
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      save();
      render();
    }

    function clearAll() {
      if (!confirm("Delete all transactions?")) return;
      transactions = [];
      save();
      render();
    }

    function save() {
      localStorage.setItem("expenses_v2", JSON.stringify(transactions));
    }

    function fmt(n) {
      return "₹" + n.toLocaleString("en-IN", {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    function render() {
      renderSummary();
      renderList();
      renderChart();
    }

    function renderSummary() {
      const income = transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
      const expense = transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
      document.getElementById("balance").textContent = fmt(income - expense);
      document.getElementById("total-income").textContent = fmt(income);
      document.getElementById("total-expense").textContent = fmt(expense);
      document.getElementById("tx-count").textContent = transactions.length;
    }

    function renderList() {
      const filtered = currentFilter === "all" ? transactions : transactions.filter(t=>t.type===currentFilter);
      const list = document.getElementById("tx-list");
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">No transactions yet.<br>Add one above!</div>`;
        return;
      }
      list.innerHTML = filtered.map(tx => `
        <div class="tx-item" id="tx-${tx.id}">
          <div class="tx-icon" style="background:${CATEGORY_COLORS[tx.category]}22;color:${CATEGORY_COLORS[tx.category]}">${CATEGORY_ICONS[tx.category]}</div>
          <div class="tx-info">
            <div class="tx-name">${tx.desc}</div>
            <div class="tx-meta">${tx.category} · ${tx.date} · ${tx.createdAt}</div>
          </div>
          <div class="tx-amount ${tx.type}">${tx.type==="income"?"+":"-"}${fmt(tx.amount)}</div>
          <button class="tx-delete" onclick="deleteTransaction(${tx.id})">🗑</button>
        </div>
      `).join("");
    }

    function renderChart() {
      const expenses = transactions.filter(t=>t.type==="expense");
      const cats = {};
      expenses.forEach(t => { cats[t.category] = (cats[t.category]||0) + t.amount; });
      const total = Object.values(cats).reduce((s,v)=>s+v,0);
      const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
      const bars = document.getElementById("cat-bars");
      if (sorted.length === 0) {
        bars.innerHTML = `<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:1rem">No expense data yet</div>`;
        return;
      }
      bars.innerHTML = sorted.map(([cat, amt]) => {
        const pct = total ? (amt/total*100).toFixed(1) : 0;
        return `
          <div class="cat-row">
            <div class="cat-label">${CATEGORY_ICONS[cat]} ${cat}</div>
            <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${CATEGORY_COLORS[cat]}"></div></div>
            <div class="cat-amount">${fmt(amt)}</div>
          </div>`;
      }).join("");
    }

    render();
  </script>
</body>
</html>
