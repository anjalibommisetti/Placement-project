<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b1120;
      --card: #131c30;
      --card2: #1a2540;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    .search-bar {
      display: flex; gap: 10px; margin-bottom: 2rem;
    }
    .search-bar input {
      flex: 1; padding: 0.75rem 1.2rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: inherit; font-size: 1rem; outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar button {
      padding: 0.75rem 1.5rem; background: var(--accent);
      color: #000; border: none; border-radius: 12px;
      font-family: inherit; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .search-bar button:hover { opacity: 0.85; }

    .main-card {
      background: linear-gradient(135deg, #1e3a5f 0%, #0b1120 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem; margin-bottom: 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
    }
    .city-name { font-size: 1.4rem; font-weight: 600; }
    .city-time { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
    .temp-big { font-size: 5rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .weather-desc { font-size: 1.1rem; color: var(--text); margin-top: 6px; text-transform: capitalize; }
    .weather-icon { font-size: 5rem; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-value { font-size: 1.6rem; font-weight: 600; }
    .stat-unit { font-size: 0.8rem; color: var(--muted); }

    .forecast-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .forecast-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.8rem; margin-bottom: 1.5rem;
    }
    .forecast-card {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem; text-align: center;
    }
    .forecast-day { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .forecast-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .forecast-temp { font-size: 1rem; font-weight: 600; }
    .forecast-low { font-size: 0.8rem; color: var(--muted); }

    .refresh-bar {
      display: flex; align-items: center; justify-content: space-between;
      color: var(--muted); font-size: 0.8rem; margin-top: 1rem;
    }
    .refresh-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
      display: inline-block; margin-right: 6px; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .error-msg { color: #f87171; text-align: center; padding: 2rem; font-size: 1rem; }
    .loading { text-align: center; color: var(--muted); padding: 3rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>🌤 Weather Dashboard</h1>
  <p class="subtitle">Live weather data — updates every 30 seconds</p>

  <div class="search-bar">
    <input type="text" id="city-input" placeholder="Enter city name... (e.g. Chennai, London)" value="Chennai" />
    <button onclick="fetchWeather()">Search</button>
  </div>

  <div id="weather-output"><div class="loading">Loading weather data...</div></div>
  <div class="refresh-bar">
    <span><span class="refresh-dot"></span> Live — auto-refresh every 30s</span>
    <span id="last-updated"></span>
  </div>

  <script>
    // ====================================================
    // HOW TO GET YOUR FREE API KEY:
    // 1. Go to https://openweathermap.org/api
    // 2. Sign up for free account
    // 3. Go to "API Keys" section → copy your key
    // 4. Paste it below replacing YOUR_API_KEY_HERE
    // ====================================================
    const API_KEY = "e38ebf7ca01a57e402aa0049113aab90";

    const weatherIcons = {
      Clear: "☀️", Clouds: "⛅", Rain: "🌧️",
      Drizzle: "🌦️", Thunderstorm: "⛈️", Snow: "❄️",
      Mist: "🌫️", Fog: "🌫️", Haze: "🌫️",
    };

    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    async function fetchWeather() {
      const city = document.getElementById("city-input").value.trim();
      if (!city) return;

      if (API_KEY === "YOUR_API_KEY_HERE") {
        document.getElementById("weather-output").innerHTML = `
          <div class="error-msg">
            ⚠️ Please get a free API key from <a href="https://openweathermap.org/api" target="_blank" style="color:var(--accent)">openweathermap.org</a><br>
            Then replace <strong>YOUR_API_KEY_HERE</strong> in the code with your key.
          </div>`;
        return;
      }

      try {
        // Current weather
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
        if (!res.ok) throw new Error("City not found");
        const data = await res.json();

        // 5-day forecast
        const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`);
        const fData = await fRes.json();

        renderWeather(data, fData);
        document.getElementById("last-updated").textContent = "Updated: " + new Date().toLocaleTimeString();
      } catch (err) {
        document.getElementById("weather-output").innerHTML = `<div class="error-msg">❌ ${err.message}. Try another city.</div>`;
      }
    }

    function renderWeather(data, fData) {
      const icon = weatherIcons[data.weather[0].main] || "🌡️";
      const sunrise = new Date(data.sys.sunrise * 1000).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
      const sunset = new Date(data.sys.sunset * 1000).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});

      // Get one forecast per day (next 5 days)
      const dailyMap = {};
      fData.list.forEach(item => {
        const day = new Date(item.dt * 1000).toDateString();
        if (!dailyMap[day]) dailyMap[day] = [];
        dailyMap[day].push(item);
      });
      const forecastDays = Object.entries(dailyMap).slice(1, 6);

      const forecastHTML = forecastDays.map(([dayStr, items]) => {
        const temps = items.map(i => i.main.temp);
        const high = Math.round(Math.max(...temps));
        const low = Math.round(Math.min(...temps));
        const weatherMain = items[Math.floor(items.length/2)].weather[0].main;
        const dayName = days[new Date(dayStr).getDay()];
        return `
          <div class="forecast-card">
            <div class="forecast-day">${dayName}</div>
            <div class="forecast-icon">${weatherIcons[weatherMain] || "🌡️"}</div>
            <div class="forecast-temp">${high}°</div>
            <div class="forecast-low">${low}°</div>
          </div>`;
      }).join("");

      document.getElementById("weather-output").innerHTML = `
        <div class="main-card">
          <div>
            <div class="city-name">📍 ${data.name}, ${data.sys.country}</div>
            <div class="city-time">${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
            <div class="temp-big">${Math.round(data.main.temp)}°C</div>
            <div class="weather-desc">${data.weather[0].description}</div>
          </div>
          <div class="weather-icon">${icon}</div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Feels Like</div>
            <div class="stat-value">${Math.round(data.main.feels_like)}° <span class="stat-unit">C</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Humidity</div>
            <div class="stat-value">${data.main.humidity}<span class="stat-unit">%</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Wind Speed</div>
            <div class="stat-value">${Math.round(data.wind.speed * 3.6)}<span class="stat-unit"> km/h</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pressure</div>
            <div class="stat-value">${data.main.pressure}<span class="stat-unit"> hPa</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Visibility</div>
            <div class="stat-value">${(data.visibility/1000).toFixed(1)}<span class="stat-unit"> km</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Sunrise / Sunset</div>
            <div class="stat-value" style="font-size:1rem">${sunrise} / ${sunset}</div>
          </div>
        </div>

        <div class="forecast-title">5-Day Forecast</div>
        <div class="forecast-grid">${forecastHTML}</div>
      `;
    }

    // Auto refresh every 30 seconds
    fetchWeather();
    setInterval(fetchWeather, 30000);

    // Search on Enter key
    document.getElementById("city-input").addEventListener("keydown", e => {
      if (e.key === "Enter") fetchWeather();
    });
  </script>
</body>
</html>
